name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The native Whisper second pass (#207) provisions the NDK (~1 GB) on first CMake configure and
      # FetchContent-clones + compiles whisper.cpp per ABI — the slowest part of the build. Cache both so
      # only the first run (or a change to the native inputs) pays that cost; #240 CI follow-up.
      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk
          key: ndk-${{ runner.os }}-27.0.12077973

      - name: Cache native build (whisper.cpp compile + FetchContent clone)
        uses: actions/cache@v4
        with:
          # Exact-key only (no restore-keys): reuse the cached compile ONLY when every native input is
          # identical; any change to the CMake/JNI/ABI config rebuilds cleanly instead of risking stale objects.
          path: apps/taskmind/.cxx
          key: cxx-${{ runner.os }}-${{ hashFiles('apps/taskmind/src/main/cpp/**', 'apps/taskmind/build.gradle.kts') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew :apps:taskmind:testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :apps:taskmind:assembleDebug --stacktrace

      # NB: CI deliberately does NOT upload the debug APK as an artifact. The APK is distributed by the
      # separate "Publish debug APK" workflow (release-apk.yml), which attaches it to the rolling
      # "debug-latest" GitHub Release (release storage, not the Actions artifact quota). Uploading the
      # ~100 MB APK artifact on every push AND pull_request churned ~28 GB and blew the Actions artifact
      # storage quota, which then failed this job even though the build + tests passed. CI's job is to
      # build + test; the assemble step above is the packaging check.

      - name: Upload test report on failure
        if: failure()
        continue-on-error: true   # a report-upload hiccup (e.g. storage quota) must never fail the build
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: apps/taskmind/build/reports/tests/
          retention-days: 7        # keep it short so debugging reports don't accumulate
          if-no-files-found: ignore

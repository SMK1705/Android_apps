name: Install to phone

# Builds the debug APK and installs it on a phone connected to the SELF-HOSTED runner
# (i.e. your laptop) over adb. Trigger it manually from the GitHub website or the GitHub
# mobile app: Actions -> "Install to phone" -> Run workflow.
#
# REQUIREMENTS (one-time):
#   1. A self-hosted runner registered on this repo, running on the laptop your phone connects to.
#      Repo -> Settings -> Actions -> Runners -> "New self-hosted runner" -> follow the steps.
#   2. Android SDK on that laptop (ANDROID_HOME set, or the default %LOCALAPPDATA%\Android\Sdk).
#   3. Phone plugged in with USB debugging enabled and this computer authorized (adb "Allow").
#
# The debug APK is signed with the repo's committed debug keystore (apps/taskmind/debug.keystore) —
# the SAME key every local and CI build now uses. That shared, stable signature is what lets both
# this install AND the over-the-air "debug-latest" build update in place and keep your data.
#
# ONE-TIME NOTE: a phone that still has an install signed with a DIFFERENT key — an older per-machine
# local debug key, or a pre-fix "debug-latest" build (each CI run used to generate a throwaway key) —
# cannot be updated in place. adb/Gradle fails with INSTALL_FAILED_UPDATE_INCOMPATIBLE ("signatures
# do not match"). Fix it once: back up in-app (Privacy -> gear -> "Back up (encrypted)"), uninstall
# the app, then re-run this workflow. Every install after that updates cleanly.

on:
  workflow_dispatch:
    inputs:
      launch:
        description: "Launch the app after installing"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  install:
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Android SDK + adb
        id: sdk
        shell: powershell
        run: |
          $sdk = if ($env:ANDROID_HOME) { $env:ANDROID_HOME }
                 elseif ($env:ANDROID_SDK_ROOT) { $env:ANDROID_SDK_ROOT }
                 else { "$env:LOCALAPPDATA\Android\Sdk" }
          if (-not (Test-Path $sdk)) { Write-Error "Android SDK not found. Set ANDROID_HOME on the runner."; exit 1 }
          $adb = Join-Path $sdk "platform-tools\adb.exe"
          if (-not (Test-Path $adb)) { Write-Error "adb not found at $adb"; exit 1 }
          # local.properties is gitignored, so the fresh checkout needs the SDK path written in.
          "sdk.dir=$($sdk -replace '\\','\\\\')" | Out-File -FilePath local.properties -Encoding ascii
          "adb=$adb" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding ascii
          Write-Host "SDK: $sdk"

      - name: Check phone is connected
        shell: powershell
        run: |
          $adb = "${{ steps.sdk.outputs.adb }}"
          & $adb start-server | Out-Null
          $connected = (& $adb devices) | Select-String '\sdevice\s*$'
          if (-not $connected) {
            & $adb devices
            Write-Error "No authorized phone detected. Plug it in (USB debugging on), tap 'Allow' on the authorize prompt, then re-run."
            exit 1
          }
          Write-Host "Connected:`n$connected"

      - name: Build and install on phone
        shell: powershell
        run: .\gradlew.bat :apps:taskmind:installDebug --stacktrace

      - name: Launch app
        if: ${{ inputs.launch }}
        shell: powershell
        run: |
          $adb = "${{ steps.sdk.outputs.adb }}"
          & $adb shell monkey -p com.rajasudhan.taskmind -c android.intent.category.LAUNCHER 1

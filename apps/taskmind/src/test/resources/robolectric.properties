# Pin Robolectric to API 35 (the app's minSdk). targetSdk 36 / compileSdk 37 are newer than
# Robolectric 4.14.1's newest packaged framework, so without this it can't resolve an SDK jar.
sdk=35
# Use a plain Application, not the real @HiltAndroidApp TaskMindApp: its startup builds
# EncryptedSharedPreferences (AndroidKeyStore), which doesn't exist on the JVM. These are DB/logic
# tests with no Hilt graph; Hilt-backed tests will opt back in per-class with @Config/HiltTestApplication.
application=android.app.Application
